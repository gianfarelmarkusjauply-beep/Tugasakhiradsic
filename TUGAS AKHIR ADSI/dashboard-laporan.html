<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Kerusakan - KOS ERVIAN II</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-indigo-900 text-white flex flex-col h-full">
        <div class="p-5 border-b border-indigo-800 text-center"><h1 class="text-xl font-bold">AREA PENGHUNI</h1></div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="dashboard-penghuni.html" class="flex items-center p-3 hover:bg-indigo-800 rounded-lg"><i class="fa-solid fa-house-user w-6"></i> Dashboard</a>
            <a href="dashboard-laporan.html" class="flex items-center p-3 bg-indigo-800 rounded-lg"><i class="fa-solid fa-screwdriver-wrench w-6"></i> Lapor Kerusakan</a>
        </nav>
        <div class="p-4 border-t border-indigo-800"><a href="login.html" class="text-rose-300 p-3 block"><i class="fa-solid fa-right-from-bracket mr-2"></i> Keluar</a></div>
    </aside>

    <div class="flex-1 overflow-y-auto">
        <header class="bg-white p-5 shadow-sm border-b"><h2 class="text-xl font-bold text-slate-800">Laporan Kerusakan</h2></header>

        <main class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white rounded-2xl shadow-sm border p-6 h-fit">
                <h3 class="font-bold mb-4 text-slate-700"><i class="fa-solid fa-pen-to-square mr-2"></i>Buat Laporan Baru</h3>
                <form id="form-laporan" onsubmit="kirimLaporan(event)" class="space-y-4">
                    <input type="text" id="judul-laporan" placeholder="Masalah (Contoh: Lampu Mati)" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <textarea id="deskripsi-laporan" rows="3" placeholder="Deskripsi lengkap..." required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Foto Bukti</label>
                        <input type="file" id="foto-laporan" accept="image/*" required class="w-full p-2 border border-dashed rounded-xl bg-slate-50 text-sm">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Kirim Laporan</button>
                </form>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-slate-700"><i class="fa-solid fa-clock-rotate-left mr-2"></i>Status Laporan Anda</h3>
                <div id="list-riwayat" class="space-y-3">
                    </div>
            </div>
        </main>
    </div>

    <script>
        const userSession = JSON.parse(localStorage.getItem('currentUser'));
        if (!userSession) window.location.href = 'login.html';

        function muatRiwayat() {
            const daftar = JSON.parse(localStorage.getItem('daftarLaporanKerusakan')) || [];
            const container = document.getElementById('list-riwayat');
            container.innerHTML = '';

            // Filter hanya laporan milik user yang login
            const milikSaya = daftar.filter(l => l.nama === userSession.nama && l.kamar === userSession.kamar);

            if(milikSaya.length === 0) {
                container.innerHTML = '<p class="text-slate-400 italic text-sm">Belum ada riwayat laporan.</p>';
                return;
            }

            milikSaya.reverse().forEach(lap => {
                let colorStatus = lap.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 
                                  lap.status === 'Proses' ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700';
                
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-slate-800">${lap.judul}</h4>
                            <span class="${colorStatus} px-2 py-1 rounded-lg text-[10px] font-black uppercase">${lap.status}</span>
                        </div>
                        <p class="text-xs text-slate-500">${lap.tanggal}</p>
                    </div>
                `;
            });
        }

        function kirimLaporan(e) {
            e.preventDefault();
            const file = document.getElementById('foto-laporan').files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const laporanBaru = {
                    id: Date.now(),
                    nama: userSession.nama,
                    kamar: userSession.kamar,
                    judul: document.getElementById('judul-laporan').value,
                    deskripsi: document.getElementById('deskripsi-laporan').value,
                    foto: event.target.result,
                    tanggal: new Date().toLocaleDateString('id-ID'),
                    status: 'Pending'
                };
                let daftar = JSON.parse(localStorage.getItem('daftarLaporanKerusakan')) || [];
                daftar.push(laporanBaru);
                localStorage.setItem('daftarLaporanKerusakan', JSON.stringify(daftar));
                alert("Laporan Terkirim!");
                document.getElementById('form-laporan').reset();
                muatRiwayat();
            };
            reader.readAsDataURL(file);
        }
        window.onload = muatRiwayat;
    </script>
</body>
</html>
